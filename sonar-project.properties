# SonarQube Project Configuration

# Project identification
sonar.projectKey=college-erp
sonar.projectName=College ERP System
sonar.projectVersion=1.0

# Source code location
sonar.sources=backend/app,frontend/app,frontend/components,frontend/services
sonar.tests=backend/tests

# Exclusions
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/venv/**,**/.next/**,**/dist/**,**/build/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts

# Python specific
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml

# TypeScript/JavaScript specific
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Language
sonar.language=py,ts,tsx,js,jsx
