name: CI Pipeline

on:
push:
pull_request:

jobs:

backend:

```
runs-on: ubuntu-latest

services:
  postgres:
    image: postgres:15
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_db
    ports:
      - 5432:5432

steps:

  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: 3.11

  - name: Install dependencies
    run: |
      cd backend
      pip install -r requirements.txt

  - name: Run tests
    run: |
      cd backend
      pytest
```

frontend:

```
runs-on: ubuntu-latest

steps:

  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install dependencies
    run: |
      cd frontend
      npm install

  - name: Build frontend
    run: |
      cd frontend
      npm run build
```
